<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Liberté - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background: #fff;
      padding: 30px 25px;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 300px;
      box-sizing: border-box;
    }

    h1 { font-size: 20px; margin-bottom: 5px; color: #333; text-align: center; }
    p.subtitle { font-size: 13px; color: #666; text-align: center; margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #333; margin-bottom: 5px; }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[type="password"]:focus { outline: none; border-color: #333; }

    button {
      width: 100%;
      padding: 10px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #555; }
    .error { color: red; font-size: 13px; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Vive la Liberté</h1>
    <p class="subtitle">Long Live Freedom!</p>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password">

    <button onclick="submitPassword()">Submit</button>
    <div id="error" class="error"></div>
  </div>

  <script>
    const CORRECT_PASSWORD = "letusbefree";
    const REDIRECT_URL = "https://docs.google.com/forms/d/e/1FAIpQLScGPQZj48KzHZiX9LlBc7TVniGiaXvUEIx5hYamQl4BhH3mqg/viewform?usp=publish-editor";

    function submitPassword() {
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("error");

      if (password === CORRECT_PASSWORD) {
        window.location.href = REDIRECT_URL;
      } else {
        error.textContent = "Try again later";
      }
    }

    document.getElementById("password").addEventListener("keypress", (e) => {
      if (e.key === "Enter") submitPassword();
    });
  </script>
</body>
</html>
